		<script>
			async function loadExternalSlides() {
				const sections = document.querySelectorAll('[data-include]');
				await Promise.all(Array.from(sections).map(async function(section) {
					var url = section.getAttribute('data-include');
					try {
						var resp = await fetch(url);
						if (resp.ok) {
							section.innerHTML = await resp.text();
							// Re-execute scripts — innerHTML-injected <script> tags are inert
							section.querySelectorAll('script').forEach(function(oldScript) {
								const newScript = document.createElement('script');
								Array.from(oldScript.attributes).forEach(function(a) {
									newScript.setAttribute(a.name, a.value);
								});
								newScript.textContent = oldScript.textContent;
								oldScript.parentNode.replaceChild(newScript, oldScript);
							});
						} else {
							section.innerHTML = '<h3 style="color:#dc3545;">Error loading: ' + url + '</h3>';
						}
					} catch(e) {
						section.innerHTML = '<h3 style="color:#dc3545;">Failed to fetch: ' + url + '</h3>';
					}
				}));
			}

			loadExternalSlides().then(function() {
				Reveal.initialize({
					hash: true,
					slideNumber: 'c/t',
					showSlideNumber: 'all',
					transition: 'none',
					transitionSpeed: 'fast',
					center: false,
					margin: 0.08,
					katex: {
						version: 'latest',
						delimiters: [
							{ left: '$$', right: '$$', display: true },
							{ left: '$', right: '$', display: false },
							{ left: '\\(', right: '\\)', display: false },
							{ left: '\\[', right: '\\]', display: true },
						],
						ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
					},
					plugins: [ RevealMath.KaTeX ]
				});
			});
		</script>
