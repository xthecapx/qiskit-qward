<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="280" fill="none"/>

  <!-- LEFT: Quantum Circuit -->
  <g transform="translate(30, 30)">
    <!-- Circuit label -->
    <text x="110" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Quantum Circuit</text>

    <!-- Qubit lines -->
    <line x1="0" y1="40" x2="220" y2="40" stroke="#64748b" stroke-width="1.5"/>
    <line x1="0" y1="90" x2="220" y2="90" stroke="#64748b" stroke-width="1.5"/>
    <line x1="0" y1="140" x2="220" y2="140" stroke="#64748b" stroke-width="1.5"/>
    <line x1="0" y1="190" x2="220" y2="190" stroke="#64748b" stroke-width="1.5"/>

    <!-- Qubit labels -->
    <text x="-10" y="44" text-anchor="end" font-size="13" fill="#475569">q₀</text>
    <text x="-10" y="94" text-anchor="end" font-size="13" fill="#475569">q₁</text>
    <text x="-10" y="144" text-anchor="end" font-size="13" fill="#475569">q₂</text>
    <text x="-10" y="194" text-anchor="end" font-size="13" fill="#475569">q₃</text>

    <!-- H gate on q0 -->
    <rect x="30" y="22" width="36" height="36" rx="4" fill="#6366f1" opacity="0.9"/>
    <text x="48" y="46" text-anchor="middle" font-size="16" font-weight="bold" fill="white">H</text>

    <!-- H gate on q1 -->
    <rect x="30" y="72" width="36" height="36" rx="4" fill="#6366f1" opacity="0.9"/>
    <text x="48" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="white">H</text>

    <!-- CNOT q0 -> q2 -->
    <circle cx="100" cy="40" r="6" fill="#0ea5e9"/>
    <line x1="100" y1="46" x2="100" y2="140" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="100" cy="140" r="12" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="88" y1="140" x2="112" y2="140" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="100" y1="128" x2="100" y2="152" stroke="#0ea5e9" stroke-width="2"/>

    <!-- CNOT q1 -> q3 -->
    <circle cx="140" cy="90" r="6" fill="#0ea5e9"/>
    <line x1="140" y1="96" x2="140" y2="190" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="140" cy="190" r="12" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="128" y1="190" x2="152" y2="190" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="140" y1="178" x2="140" y2="202" stroke="#0ea5e9" stroke-width="2"/>

    <!-- Rz gate on q2 -->
    <rect x="160" y="122" width="36" height="36" rx="4" fill="#8b5cf6" opacity="0.9"/>
    <text x="178" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Rz</text>

    <!-- T gate on q0 -->
    <rect x="160" y="22" width="36" height="36" rx="4" fill="#8b5cf6" opacity="0.9"/>
    <text x="178" y="46" text-anchor="middle" font-size="16" font-weight="bold" fill="white">T</text>

    <!-- Measurement symbols -->
    <g transform="translate(205, 175)">
      <rect x="-12" y="-12" width="30" height="30" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
      <path d="M -4 10 Q 3 -6 10 10" fill="none" stroke="#475569" stroke-width="1.5"/>
      <line x1="3" y1="2" x2="10" y2="-8" stroke="#475569" stroke-width="1.5"/>
    </g>
  </g>

  <!-- MIDDLE: Arrow with "extract" label -->
  <g transform="translate(290, 120)">
    <!-- Arrow body -->
    <line x1="0" y1="20" x2="100" y2="20" stroke="#10b981" stroke-width="3" stroke-dasharray="6,4"/>
    <!-- Arrow head -->
    <polygon points="100,10 120,20 100,30" fill="#10b981"/>
    <!-- Label -->
    <text x="60" y="55" text-anchor="middle" font-size="12" fill="#059669" font-style="italic">extract</text>
  </g>

  <!-- RIGHT: Feature Vector -->
  <g transform="translate(440, 20)">
    <!-- Vector label -->
    <text x="160" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Circuit Footprint Vector</text>

    <!-- Vector bracket left -->
    <path d="M 40 15 Q 30 15 30 25 L 30 225 Q 30 235 40 235" fill="none" stroke="#334155" stroke-width="2"/>

    <!-- Vector entries with colored backgrounds -->
    <!-- Entry 1: depth -->
    <rect x="50" y="18" width="220" height="26" rx="4" fill="#ede9fe"/>
    <text x="60" y="36" font-size="12" fill="#5b21b6">depth</text>
    <text x="260" y="36" text-anchor="end" font-size="13" font-weight="bold" fill="#5b21b6">4</text>

    <!-- Entry 2: width -->
    <rect x="50" y="48" width="220" height="26" rx="4" fill="#e0f2fe"/>
    <text x="60" y="66" font-size="12" fill="#0369a1">width</text>
    <text x="260" y="66" text-anchor="end" font-size="13" font-weight="bold" fill="#0369a1">4</text>

    <!-- Entry 3: gate_count -->
    <rect x="50" y="78" width="220" height="26" rx="4" fill="#ede9fe"/>
    <text x="60" y="96" font-size="12" fill="#5b21b6">gate_count</text>
    <text x="260" y="96" text-anchor="end" font-size="13" font-weight="bold" fill="#5b21b6">6</text>

    <!-- Entry 4: cnot_count -->
    <rect x="50" y="108" width="220" height="26" rx="4" fill="#e0f2fe"/>
    <text x="60" y="126" font-size="12" fill="#0369a1">cx_count</text>
    <text x="260" y="126" text-anchor="end" font-size="13" font-weight="bold" fill="#0369a1">2</text>

    <!-- Entry 5: t_depth -->
    <rect x="50" y="138" width="220" height="26" rx="4" fill="#ede9fe"/>
    <text x="60" y="156" font-size="12" fill="#5b21b6">t_depth</text>
    <text x="260" y="156" text-anchor="end" font-size="13" font-weight="bold" fill="#5b21b6">1</text>

    <!-- Entry 6: parallelism -->
    <rect x="50" y="168" width="220" height="26" rx="4" fill="#e0f2fe"/>
    <text x="60" y="186" font-size="12" fill="#0369a1">parallelism</text>
    <text x="260" y="186" text-anchor="end" font-size="13" font-weight="bold" fill="#0369a1">0.67</text>

    <!-- Entry 7: entanglement_ratio -->
    <rect x="50" y="198" width="220" height="26" rx="4" fill="#ede9fe"/>
    <text x="60" y="216" font-size="12" fill="#5b21b6">entanglement_ratio</text>
    <text x="260" y="216" text-anchor="end" font-size="13" font-weight="bold" fill="#5b21b6">0.50</text>

    <!-- Ellipsis -->
    <text x="160" y="248" text-anchor="middle" font-size="16" fill="#94a3b8">⋮</text>

    <!-- Vector bracket right -->
    <path d="M 280 15 Q 290 15 290 25 L 290 225 Q 290 235 280 235" fill="none" stroke="#334155" stroke-width="2"/>
  </g>
</svg>
